name: "🎨 Add Theme"
description: >
  Do you have a theme that is not yet listed and want it to be listed in the repo?

title: "Add Theme <theme>"
labels:
  - request
  - theme

body:      
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > If you are familiar with GitHub and know [how to create a Pull Request](https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/proposing-changes-to-your-work-with-pull-requests/creating-a-pull-request), **please consider submitting your suggestion directly as a PR** instead of opening an issue. Pull Requests are usually reviewed and processed faster. Issues are mainly intended for users who are unsure how to contribute via PR.
        
        **Thank you so much for your help to make this list even better! 💖**

  - type: input
    id: theme-name
    attributes:
      label: Theme Name
    validations:
      required: true

  - type: input
    id: theme-website
    attributes:
      label: Theme Website
      description: Link to the project (e.g. GitHub)
      placeholder: ex. https://github.com/awesome-jellyfin/awesome-jellyfin
    validations:
      required: true
  
  - type: checkboxes
    id: type
    attributes:
      label: Type
      description: Select the type of the theme
      options:
        - label: Changes Look and Feel
        - label: Introduces something
        - label: Fixes something

  - type: textarea
    id: screenshot-1
    attributes:
      label: Screenshot 1
      description: Add a link to a screenshot (if possible from original repository)
    validations:
      required: true

  - type: textarea
    id: screenshot-2
    attributes:
      label: Screenshot 2
      description: Add a link to a screenshot (if possible from original repository)
    validations:
      required: true

  - type: textarea
    id: screenshot-3
    attributes:
      label: Additional Screenshots (optional)
      description: Here you can add more screenshots
    validations:
      required: false
      
  - type: textarea
    id: other
    attributes:
      label: Anything else?
