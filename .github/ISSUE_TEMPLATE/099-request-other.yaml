name: "✨ Request something else"
description: >
  Do you have anything else that is not yet listed and want it to be listed in the repo?

title: "Add <project>"
labels: 
  - request

body:
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > If you are familiar with GitHub and know [how to create a Pull Request](https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/proposing-changes-to-your-work-with-pull-requests/creating-a-pull-request), **please consider submitting your suggestion directly as a PR** instead of opening an issue. Pull Requests are usually reviewed and processed faster. Issues are mainly intended for users who are unsure how to contribute via PR.
        
        **Thank you so much for your help to make this list even better! 💖**
      
  - type: input
    id: project-website
    attributes:
      label: Project Website
      description: Link to the project (e.g. GitHub)
      placeholder: ex. https://github.com/awesome-jellyfin/awesome-jellyfin
    validations:
      required: true
      
  - type: textarea
    id: project-description
    attributes:
      label: Project Description
      description: Description of the project
    validations:
      required: true

  - type: input
    id: short-description
    attributes:
      label: Short Description
      description: |
        This description will be shown in the list. 
        It should be:
        * neutral
        * 1 (max 2) sentence(s) long
        * shouldn't contain technologies (e.g. `Built with Python`)
        * use proper capitalization (e.g. `Jellyfin` instead of `jellyfin`)
        * start with a capital letter and end with a `.`
    
  - type: textarea
    id: other
    attributes:
      label: Anything else?
